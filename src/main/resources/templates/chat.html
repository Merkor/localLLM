<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Local LLM Chat</title>
    <link rel="icon" href="data:,">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css" rel="stylesheet">
    <link href="/css/chat.css" rel="stylesheet">
</head>
<body th:attr="data-active-chat-id=${activeChatId}">
<div class="container-fluid chat-shell">
    <div class="chat-layout">
        <aside id="sidebar" class="sidebar border-end">
            <div class="sidebar-header p-3 border-bottom">
                <div class="sidebar-top-row d-flex justify-content-between align-items-center">
                    <h1 class="h5 m-0 sidebar-title">Local LLM Chat</h1>
                    <div class="sidebar-top-actions">
                        <button id="newChatBtn" class="btn btn-sm new-chat-btn" title="Новый чат" aria-label="Новый чат">
                            <i data-lucide="plus" class="btn-icon"></i>
                        </button>
                        <button id="sidebarToggleBtn" type="button" class="btn btn-sm sidebar-toggle-btn" title="Свернуть панель" aria-label="Свернуть панель">
                            <i data-lucide="panel-left-close" class="btn-icon"></i>
                        </button>
                    </div>
                </div>
                <button id="sidebarExpandBtn" type="button" class="btn btn-sm sidebar-expand-btn" title="Развернуть панель" aria-label="Развернуть панель">
                    <i data-lucide="panel-left-open" class="btn-icon"></i>
                </button>
                <button id="newChatCollapsedBtn" class="btn btn-sm new-chat-btn" title="Новый чат" aria-label="Новый чат">
                    <i data-lucide="plus" class="btn-icon"></i>
                </button>
            </div>
            <div id="chatList" class="chat-list p-2">
                <div th:if="${#lists.isEmpty(chats)}" class="text-secondary small p-2">Чатов пока нет</div>
                <div th:each="chat : ${chats}" class="chat-item"
                     th:classappend="${chat.id == activeChatId} ? 'active' : ''"
                     th:attr="data-chat-id=${chat.id}">
                    <a class="chat-link" th:href="@{/chats/{id}(id=${chat.id})}" th:text="${chat.title}">Чат</a>
                    <div class="chat-actions">
                        <button type="button" class="chat-icon-btn rename-chat-btn" title="Переименовать" aria-label="Переименовать чат">
                            <i data-lucide="pencil-line" class="action-icon"></i>
                        </button>
                        <button type="button" class="chat-icon-btn delete-chat-btn" title="Удалить" aria-label="Удалить чат">
                            <i data-lucide="trash-2" class="action-icon"></i>
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-panel d-flex flex-column">
            <div id="messages" class="messages">
                <div class="chat-center">
                    <div th:if="${activeChatId == null}" class="empty-state text-secondary">
                        Создайте новый чат для начала диалога.
                    </div>

                    <div th:each="msg : ${activeMessages}" class="message-row"
                         th:classappend="${msg.role.name() == 'USER'} ? 'user' : (${msg.role.name() == 'SYSTEM'} ? 'system' : 'assistant')">
                        <div class="message-card">
                            <div class="message-meta" th:if="${msg.role.name() != 'USER'}" th:text="${msg.role.name()}">ROLE</div>
                            <div class="message-content markdown"
                                 th:if="${msg.role.name() != 'USER'}"
                                 th:text="${msg.content}">Assistant message
                            </div>
                            <div class="message-content"
                                 th:if="${msg.role.name() == 'USER'}"
                                 th:text="${msg.content}">User message
                            </div>
                        </div>
                    </div>

                    <div id="typingIndicator" class="typing-indicator d-none">Ассистент печатает...</div>
                </div>
            </div>

            <div class="composer border-top">
                <div class="chat-center">
                    <form id="messageForm" class="composer-form">
                        <div class="composer-input-shell">
                        <textarea id="messageInput" class="composer-input" rows="1"
                                  placeholder="Введите сообщение..."
                                  th:disabled="${activeChatId == null}"></textarea>
                        <button id="sendBtn" type="submit" class="btn send-btn"
                                th:disabled="${activeChatId == null}" aria-label="Отправить сообщение" title="Отправить">
                            <i data-lucide="arrow-up" class="btn-icon"></i>
                        </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="/js/chat.js"></script>
<script>
    if (window.lucide) {
        window.lucide.createIcons();
    }
</script>
</body>
</html>
